<!DOCTYPE html>
<html>
<head>
  <title>before Icon Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
</head>
<body>
<p>Wait for the font to load, then right-click each canvas and "Save image as" to get the icon PNGs.</p>
<div>
  <p>16x16:</p><canvas id="c16" width="16" height="16"></canvas>
  <p>48x48:</p><canvas id="c48" width="48" height="48"></canvas>
  <p>128x128:</p><canvas id="c128" width="128" height="128"></canvas>
</div>
<script>
// Wait for font to load before drawing
document.fonts.ready.then(() => {
  drawIcon('c16', 16);
  drawIcon('c48', 48);
  drawIcon('c128', 128);
});

function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.15);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#00e59f';
  ctx.lineWidth = Math.max(1, size * 0.04);
  ctx.beginPath();
  ctx.roundRect(ctx.lineWidth / 2, ctx.lineWidth / 2, size - ctx.lineWidth, size - ctx.lineWidth, size * 0.15);
  ctx.stroke();

  // Italic "b" lettermark using Instrument Serif
  ctx.fillStyle = '#00e59f';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (size <= 16) {
    ctx.font = 'italic 11px "Instrument Serif", serif';
    ctx.fillText('b', size / 2, size / 2 + 1);
  } else {
    ctx.font = `italic ${Math.floor(size * 0.55)}px "Instrument Serif", serif`;
    ctx.fillText('b', size / 2, size / 2 + size * 0.04);
  }
}
</script>
</body>
</html>

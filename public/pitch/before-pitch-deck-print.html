<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>before — Pre-Seed Pitch Deck</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #e6efe9; font-family: 'IBM Plex Sans', sans-serif; }
  * { box-sizing: border-box; }
  @keyframes blink { 0%, 50% { opacity: 1 } 51%, 100% { opacity: 0 } }

  /* Tweaks panel */
  #tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 9999;
    background: #0f1412; border: 1px solid #2b3a35; color: #e6efe9;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 16px 18px; min-width: 240px; display: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #tweaks.on { display: block; }
  #tweaks h4 { margin: 0 0 12px 0; font-size: 11px; letter-spacing: 0.2em; color: #00ff9c; font-weight: 500; }
  #tweaks .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 8px 0; border-top: 1px solid #1f2a26; }
  #tweaks .row:first-of-type { border-top: none; }
  #tweaks label { color: #8a9a93; letter-spacing: 0.08em; text-transform: uppercase; font-size: 10px; }
  #tweaks button {
    background: transparent; border: 1px solid #2b3a35; color: #e6efe9;
    font-family: inherit; font-size: 11px; padding: 4px 10px; cursor: pointer;
    letter-spacing: 0.08em;
  }
  #tweaks button.active { border-color: #00ff9c; color: #00ff9c; }
  #tweaks .swatches { display: flex; gap: 6px; }
  #tweaks .swatch { width: 22px; height: 22px; border: 1px solid #2b3a35; cursor: pointer; }
  #tweaks .swatch.active { border-color: #fff; }

  deck-stage { background: #000; }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #0a0d0c !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    #tweaks { display: none !important; }
  }
</style>

<script type="application/json" id="speaker-notes">[]</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="deck-stage.js"></script>
</head>
<body>

<deck-stage width="1920" height="1080"></deck-stage>

<div id="tweaks">
  <h4>TWEAKS</h4>
  <div class="row">
    <label>Accent</label>
    <div class="swatches" id="accent-swatches">
      <div class="swatch active" data-accent="#00ff9c" style="background:#00ff9c"></div>
      <div class="swatch" data-accent="#ffb347" style="background:#ffb347"></div>
      <div class="swatch" data-accent="#7ab8ff" style="background:#7ab8ff"></div>
      <div class="swatch" data-accent="#ff5a5a" style="background:#ff5a5a"></div>
    </div>
  </div>
  <div class="row">
    <label>Ticker</label>
    <div>
      <button class="active" data-ticker="on">ON</button>
      <button data-ticker="off">OFF</button>
    </div>
  </div>
</div>

<script src="slides.jsx" type="text/babel"></script>

<script type="text/babel">
  const stage = document.querySelector('deck-stage');
  const defaults = /*EDITMODE-BEGIN*/{
    "accent": "#00ff9c",
    "ticker": "on"
  }/*EDITMODE-END*/;

  function applyTweaks(t) {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.body.classList.toggle('no-ticker', t.ticker === 'off');
    // Re-render by updating a CSS override: we replace green accent via style tag
    let s = document.getElementById('accent-style');
    if (!s) {
      s = document.createElement('style');
      s.id = 'accent-style';
      document.head.appendChild(s);
    }
    s.textContent = `
      [data-accent] * { }
    `;
  }
  // Simple live-patch: swap C.green in memory and re-render
  let currentAccent = defaults.accent;
  let tickerVisible = defaults.ticker === 'on';

  function mountSlides() {
    // Patch color
    if (window.B4E_C) window.B4E_C.green = currentAccent;

    SLIDES.forEach(({ label, Comp }, i) => {
      const section = document.createElement('section');
      section.setAttribute('data-label', label);
      section.style.background = '#0a0d0c';
      stage.appendChild(section);
      const root = ReactDOM.createRoot(section);
      root.render(<Comp idx={i + 1} total={SLIDES.length} />);
    });

    if (!tickerVisible) {
      const style = document.createElement('style');
      style.id = 'ticker-hide';
      style.textContent = `
        deck-stage section > div > div:first-child[style*="top: 0"] { display: none !important; }
      `;
      document.head.appendChild(style);
    }
  }

  function remount() {
    // clear
    while (stage.firstChild) stage.removeChild(stage.firstChild);
    mountSlides();
  }

  mountSlides();

  // Tweak wiring
  const panel = document.getElementById('tweaks');

  function postKeys(obj) {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: obj }, '*');
  }

  document.querySelectorAll('#accent-swatches .swatch').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#accent-swatches .swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      currentAccent = el.dataset.accent;
      postKeys({ accent: currentAccent });
      remount();
    });
  });

  document.querySelectorAll('[data-ticker]').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('[data-ticker]').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      tickerVisible = el.dataset.ticker === 'on';
      postKeys({ ticker: el.dataset.ticker });
      const existing = document.getElementById('ticker-hide');
      if (existing) existing.remove();
      if (!tickerVisible) {
        const style = document.createElement('style');
        style.id = 'ticker-hide';
        style.textContent = `
          deck-stage section > div > div:first-child[style*="top: 0"] { display: none !important; }
        `;
        document.head.appendChild(style);
      }
    });
  });

  // Tweak mode host integration
  window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;
    if (e.data.type === '__activate_edit_mode') panel.classList.add('on');
    if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('on');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  // Auto-print once everything is ready
  (async () => {
    try { await document.fonts.ready; } catch(e) {}
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>

</body>
</html>
